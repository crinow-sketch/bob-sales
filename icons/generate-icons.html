<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body style="background:#333;padding:40px;">
<p style="color:#fff">Right-click each icon and "Save image as..." to save them, or use the download buttons below.</p>

<h3 style="color:#fff">192x192</h3>
<canvas id="c192" width="192" height="192"></canvas>
<br><button onclick="download('c192','icon-192.png')">Download 192</button>

<h3 style="color:#fff">512x512</h3>
<canvas id="c512" width="512" height="512"></canvas>
<br><button onclick="download('c512','icon-512.png')">Download 512</button>

<h3 style="color:#fff">180x180 (Apple Touch)</h3>
<canvas id="c180" width="180" height="180"></canvas>
<br><button onclick="download('c180','apple-touch-icon.png')">Download 180</button>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const r = s * 0.18; // corner radius

  // Background with rounded corners
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  // Dark background gradient
  const grad = ctx.createLinearGradient(0, 0, s, s);
  grad.addColorStop(0, '#12202e');
  grad.addColorStop(1, '#0f1923');
  ctx.fillStyle = grad;
  ctx.fill();

  // Amber accent line at top
  ctx.fillStyle = '#f0a500';
  ctx.fillRect(s * 0.15, s * 0.08, s * 0.7, s * 0.025);

  // "BOB" text
  ctx.fillStyle = '#f0a500';
  ctx.font = `900 ${s * 0.32}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('BOB', s / 2, s * 0.42);

  // "SALES" subtitle
  ctx.fillStyle = '#8899aa';
  ctx.font = `700 ${s * 0.1}px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif`;
  ctx.letterSpacing = `${s * 0.02}px`;
  ctx.fillText('SALES', s / 2, s * 0.62);

  // Small beer mug icon (simple)
  const mx = s / 2;
  const my = s * 0.8;
  const ms = s * 0.06;
  ctx.fillStyle = '#f0a500';
  ctx.fillRect(mx - ms, my - ms * 1.2, ms * 2, ms * 2.2);
  ctx.fillRect(mx + ms, my - ms * 0.6, ms * 0.5, ms * 1.2);

  // Amber accent line at bottom
  ctx.fillStyle = '#f0a500';
  ctx.fillRect(s * 0.15, s * 0.92 - s * 0.025, s * 0.7, s * 0.025);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
drawIcon(document.getElementById('c180'));

function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
